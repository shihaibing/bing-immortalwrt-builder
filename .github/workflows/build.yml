name: Bing ImmortalWrt Firmware Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run ImageBuilder
        run: |
          mkdir -p bin/
          docker run --rm \
            -v ${{ github.workspace }}/bin:/home/build/openwrt/bin \
            immortalwrt/imagebuilder:x86-64-openwrt-25.12 \
            bash -c "
              echo '正在更新大本营仓库软件源...'
              ./scripts/feeds update -a
              
              PACKAGES_LIST='luci-app-diskman luci-app-filebrowser luci-theme-argon luci-app-argon-config luci-app-ttyd luci-app-turboacc luci-app-openclash luci-compat kmod-tun kmod-inet-diag kmod-nft-tproxy bash curl ip-full unzip luci-app-samba4 kmod-fs-ext4'
              
              echo '开始智能校验插件是否存在...'
              FINAL_PACKAGES=''
              for pkg in \$PACKAGES_LIST; do
                if grep -q \"Package: \$pkg\" feeds.list 2>/dev/null || [ \"\$pkg\" = \"luci-app-openclash\" ]; then
                  FINAL_PACKAGES=\"\$FINAL_PACKAGES \$pkg\"
                else
                  # 尝试在本地包索引里再次确认
                  if [ -f tmp/.packageinfo ] && grep -q \"Profile: \$pkg\" tmp/.packageinfo 2>/dev/null; then
                    FINAL_PACKAGES=\"\$FINAL_PACKAGES \$pkg\"
                  else
                    echo \"⚠️ 仓库中未找到插件: \$pkg，已自动跳过\"
                  fi
                fi
              done
              
              # 如果上面的判断太严格，我们直接用常规尝试，但允许失败，或者直接执行下面的安全make
              make image PROFILE=generic PACKAGES=\"luci-app-diskman luci-app-filebrowser luci-theme-argon luci-app-argon-config luci-app-ttyd luci-app-openclash luci-compat kmod-tun kmod-inet-diag kmod-nft-tproxy bash curl ip-full unzip luci-app-samba4 kmod-fs-ext4\" || \
              make image PROFILE=generic PACKAGES=\"luci-app-diskman luci-app-filebrowser luci-theme-argon luci-app-argon-config luci-app-ttyd luci-app-openclash luci-compat kmod-tun kmod-inet-diag kmod-nft-tproxy bash curl ip-full unzip luci-app-samba4 kmod-fs-ext4\"
            "

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Bing-ImmortalWrt-Firmware
          path: bin/targets/x86/64/*
